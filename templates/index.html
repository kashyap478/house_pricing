<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>House Price Prediction</title>
  </head>
  <body class="bg-dark">
    <div class="container">
        <div class="row">
            <div class="card" style ="width: 100%; height: 100%; margin-top: 50px">
                
            <div class="card-header" style="text-align: center;">
               <h1>Welcome to House Price Predictor</h1> 
             </div>
            <div class="card-body">
                <form method="post" accept-charset="utf-8">
                    <div class="mb-3">
                      <label for="exampleInputEmail1" class="form-label"><b>Select the Locattion:</b></label>
                      <select class="form-select" aria-label="Default select example" id="location" name="location" required="1">
                        {% for location in locations %}    
                        <option value="{{ location }}">{{ location }}</option>
                        {% endfor %}

                      </select>
                    </div>
                    <div class="mb-3">
                      <label for="bhk" class="form-label"><b>Enter BHK:</b></label>
                      <input type="text" class="form-control" name="bhk" id="bhk" placeholder="Enter BHK">
                    </div>
                    <div class="mb-3">
                        <label for="bath" class="form-label"><b>Enter Number of Bathrooms:</b></label>
                        <input type="text" class="form-control"  name="bath" id="bath" placeholder="Enter Number of Bathrooms">
                      </div> 
                      <div class="mb-3">
                        <label for="total_sqft" class="form-label"><b>Enter Total Square Feet:</b></label>
                        <input type="text" class="form-control" id="total_sqft" name="total_sqft" placeholder="Enter Total Square Feet">
                      </div>
                    <button type="submit" class="btn btn-primary" onclick="send_data()">Predict Price</button>
                  </form>
                  <br>


                  <div class="col-md-12" style="text-align: center">
                      <h3><span id="prediction"></span></h3>
                  </div>

            </div>


            </div>
        </div>
    </div>
   
    <script>
      function form_handler(event){
        event.preventDefault();
      }
      function send_data(){
         document.querySelector('form').addEventListener("submit",form_handler);
         var fd = new FormData(document.querySelector('form'));

         var xhr = new XMLHttpRequest();
         xhr.open('POST','/predict',true);
         document.getElementById("prediction").innerHTML = "Wait Predicting Price!....";
        xhr.onreadystatechange = function(){
          if(xhr.readyState == XMLHttpRequest.DONE){
            document.getElementById('prediction').innerHTML="prediction: ₹ "+xhr.responseText;
          }
        };

        xhr.onload = function(){};
        xhr.send(fd);

        }
    </script>
    
    <!-- Option 2: Separate Popper and Bootstrap JS -->
    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    
  </body>
</html>
